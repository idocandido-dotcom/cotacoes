name: Atualizar Cotações Nordeste Agro

on:
  schedule:
    # Roda uma vez por dia.
    # GitHub usa horário UTC.
    # 11:20 UTC = 08:20 no horário de Fortaleza/Brasília.
    - cron: "20 11 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-cotacoes:
    runs-on: ubuntu-22.04

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip

          if [ -f "cotacoes/requirements.txt" ]; then
            echo "Instalando dependências de cotacoes/requirements.txt"
            pip install -r cotacoes/requirements.txt
          elif [ -f "requirements.txt" ]; then
            echo "Instalando dependências de requirements.txt"
            pip install -r requirements.txt
          else
            echo "requirements.txt não encontrado. Instalando dependências mínimas."
            pip install requests beautifulsoup4 lxml python-dateutil playwright==1.44.0
          fi

          pip install playwright==1.44.0

      - name: Instalar navegador Chromium do Playwright
        run: |
          python -m playwright install chromium

      - name: Listar arquivos do projeto
        run: |
          echo "Arquivos encontrados no repositório:"
          find . -maxdepth 4 -type f | sort

      - name: Rodar coletor de cotações
        run: |
          echo "Rodando coletor:"
          python cotacoes/scripts/coletor_cotacoes_nordeste.py

      - name: Conferir arquivos gerados
        run: |
          echo "Arquivos gerados em cotacoes/public:"
          find cotacoes/public -maxdepth 2 -type f | sort

          echo ""
          echo "Arquivos gerados em cotacoes/logs:"
          find cotacoes/logs -maxdepth 2 -type f | sort || true

      - name: Salvar alterações no GitHub
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add cotacoes/public/cotacoes_nordeste.json || true
          git add cotacoes/public/cotacoes_regionais.json || true
          git add cotacoes/public/cotacoes_nordeste.csv || true

          git add cotacoes/logs/status_ultima_execucao.json || true
          git add cotacoes/logs/debug_conab_produtos_360.json || true
          git add cotacoes/logs/debug_sorgo_conab.json || true
          git add cotacoes/logs/debug_leite_carne_conab.json || true

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para salvar."
          else
            git commit -m "Atualizar cotações Nordeste Agro"
            git push
          fi
