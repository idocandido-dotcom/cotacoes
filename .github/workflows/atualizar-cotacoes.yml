name: Atualizar Cotações Nordeste Agro

on:
  schedule:
    # Roda todos os dias às 09:30 UTC.
    # Equivale a 06:30 no horário de Brasília/Fortaleza.
    - cron: "30 9 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  atualizar-cotacoes:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas lxml html5lib

      - name: Localizar coletor de cotações
        id: localizar_coletor
        shell: bash
        run: |
          echo "Procurando coletor atualizado..."

          if [ -f "cotacoes/coletor_cotacoes_nordeste_v1_3_1_atualizado.py" ]; then
            echo "COLETOR=cotacoes/coletor_cotacoes_nordeste_v1_3_1_atualizado.py" >> "$GITHUB_ENV"
          elif [ -f "scripts/coletor_cotacoes_nordeste_v1_3_1_atualizado.py" ]; then
            echo "COLETOR=scripts/coletor_cotacoes_nordeste_v1_3_1_atualizado.py" >> "$GITHUB_ENV"
          elif [ -f "cotacoes/coletor_cotacoes_nordeste_v1_3_0.py" ]; then
            echo "COLETOR=cotacoes/coletor_cotacoes_nordeste_v1_3_0.py" >> "$GITHUB_ENV"
          elif [ -f "scripts/coletor_cotacoes_nordeste_v1_3_0.py" ]; then
            echo "COLETOR=scripts/coletor_cotacoes_nordeste_v1_3_0.py" >> "$GITHUB_ENV"
          elif [ -f "coletor_cotacoes_nordeste_v1_3_1_atualizado.py" ]; then
            echo "COLETOR=coletor_cotacoes_nordeste_v1_3_1_atualizado.py" >> "$GITHUB_ENV"
          elif [ -f "coletor_cotacoes_nordeste_v1_3_0.py" ]; then
            echo "COLETOR=coletor_cotacoes_nordeste_v1_3_0.py" >> "$GITHUB_ENV"
          else
            echo "ERRO: nenhum coletor de cotações foi encontrado."
            echo "Arquivos Python encontrados:"
            find . -name "*.py" -maxdepth 4
            exit 1
          fi

      - name: Mostrar coletor selecionado
        run: |
          echo "Coletor selecionado: $COLETOR"

      - name: Rodar coletor de cotações
        run: |
          python "$COLETOR"

      - name: Verificar arquivos gerados
        run: |
          echo "Verificando arquivos principais..."

          test -f public/cotacoes_nordeste.json
          test -f public/cotacoes_regionais.json
          test -f public/cotacoes_nordeste.csv
          test -f logs/status_ultima_execucao.json

          echo "Validando JSON principal..."
          python -m json.tool public/cotacoes_nordeste.json > /tmp/cotacoes_nordeste_validado.json

          echo "Validando JSON regional..."
          python -m json.tool public/cotacoes_regionais.json > /tmp/cotacoes_regionais_validado.json

          echo "Validando log..."
          python -m json.tool logs/status_ultima_execucao.json > /tmp/status_ultima_execucao_validado.json

      - name: Mostrar resumo da execução
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          log_path = Path("logs/status_ultima_execucao.json")
          json_path = Path("public/cotacoes_nordeste.json")

          if log_path.exists():
              with log_path.open("r", encoding="utf-8") as f:
                  log = json.load(f)

              print("Resumo do status:")
              print("Projeto:", log.get("projeto"))
              print("Módulo:", log.get("modulo"))
              print("Versão:", log.get("versao"))
              print("Início:", log.get("inicio"))
              print("Fim:", log.get("fim"))
              print("Total tabela:", log.get("total_cotacoes_tabela"))
              print("Total brutas:", log.get("total_cotacoes_brutas"))
              print("Total HTML:", log.get("total_dados_html"))
              print("Descartadas validação:", log.get("total_cotacoes_descartadas_por_validacao"))
              print("Descartadas nível:", log.get("total_cotacoes_descartadas_por_nivel"))

          if json_path.exists():
              with json_path.open("r", encoding="utf-8") as f:
                  dados = json.load(f)

              lista = dados.get("dados", [])
              print("")
              print("Resumo do JSON:")
              print("Total de itens em dados:", len(lista))

              print("")
              print("Itens de leite e boi gordo encontrados:")
              for item in lista:
                  produto = str(item.get("produto", "")).lower()
                  produto_base = str(item.get("produto_base", "")).lower()
                  if "leite" in produto or "leite" in produto_base or "boi" in produto or "boi" in produto_base:
                      print(
                          item.get("estado"),
                          item.get("cidade"),
                          item.get("produto"),
                          item.get("preco"),
                          item.get("unidade"),
                          item.get("fonte"),
                          item.get("nivel_comercializacao")
                      )
          PY

      - name: Commit automático dos arquivos atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/cotacoes_nordeste.json
          git add public/cotacoes_regionais.json
          git add public/cotacoes_nordeste.csv
          git add logs/status_ultima_execucao.json
          git add logs/debug_conab_produtos_360.json || true
          git add logs/debug_sorgo_conab.json || true
          git add logs/debug_leite_carne_conab.json || true
          git add logs/debug_pecuaria_fontes.json || true
          git add logs/debug_ceasas.json || true

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commitar."
          else
            git commit -m "Atualizar cotações Nordeste Agro"
            git push
          fi
