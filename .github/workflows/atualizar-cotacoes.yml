name: Atualizar Cotações Nordeste Agro

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/atualizar-cotacoes.yml"
      - "cotacoes/scripts/coletor_cotacoes_nordeste.py"
      - "cotacoes/dados_aiba/aiba_soja_oeste_bahia.csv"

  schedule:
    # Roda todos os dias às 09:00 no horário de Brasília/Fortaleza.
    # O GitHub Actions usa UTC.
    # 09:00 BRT = 12:00 UTC.
    - cron: "0 12 * * *"

  workflow_dispatch:
    inputs:
      origem:
        description: "Origem do disparo"
        required: false
        default: "manual"

permissions:
  contents: write
  actions: read

concurrency:
  group: atualizar-cotacoes-nordeste-agro
  cancel-in-progress: false

jobs:
  atualizar-cotacoes:
    name: Executar coletor de cotações
    runs-on: ubuntu-latest
    timeout-minutes: 18

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mostrar origem do disparo
        run: |
          echo "Workflow iniciado."
          echo "Origem informada: ${{ github.event.inputs.origem }}"
          echo "Evento: ${{ github.event_name }}"
          echo "Branch/Ref: ${{ github.ref }}"

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Localizar coletor de cotações
        shell: bash
        run: |
          if [ -f "cotacoes/scripts/coletor_cotacoes_nordeste.py" ]; then
            echo "COLETOR=cotacoes/scripts/coletor_cotacoes_nordeste.py" >> "$GITHUB_ENV"
            echo "Coletor encontrado: cotacoes/scripts/coletor_cotacoes_nordeste.py"
          else
            echo "ERRO: coletor principal não foi encontrado."
            echo "Arquivos Python encontrados no repositório:"
            find . -maxdepth 5 -name "*.py" -print
            exit 1
          fi

      - name: Aplicar fallback CSV local da AIBA no coletor
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("cotacoes/scripts/coletor_cotacoes_nordeste.py")
          texto = path.read_text(encoding="utf-8")

          linha_constante = 'AIBA_CSV_LOCAL = ROOT_DIR / "dados_aiba" / "aiba_soja_oeste_bahia.csv"'
          if linha_constante not in texto:
              texto = texto.replace(
                  'AIBA_URL = "https://aiba.org.br/cotacoes/"',
                  'AIBA_URL = "https://aiba.org.br/cotacoes/"\n' + linha_constante,
                  1,
              )

          marcador = "# AUTO PATCH AIBA CSV LOCAL - INICIO"
          if marcador not in texto:
              bloco = r'''
# AUTO PATCH AIBA CSV LOCAL - INICIO
# Fallback estável para AIBA via arquivo local do repositório:
# cotacoes/dados_aiba/aiba_soja_oeste_bahia.csv

def ler_csv_aiba_local() -> list[dict[str, Any]]:
    if not AIBA_CSV_LOCAL.exists():
        return []

    try:
        conteudo = AIBA_CSV_LOCAL.read_text(encoding="utf-8-sig").strip()
    except Exception:
        return []

    if not conteudo:
        return []

    primeira_linha = conteudo.splitlines()[0] if conteudo.splitlines() else ""
    separador = ";" if primeira_linha.count(";") > primeira_linha.count(",") else ","

    try:
        registros = list(csv.DictReader(io.StringIO(conteudo), delimiter=separador))
    except Exception:
        return []

    itens: list[dict[str, Any]] = []

    for linha in registros:
        if not isinstance(linha, dict):
            continue

        produto_original = limpar_texto(
            linha.get("produto")
            or linha.get("commodity")
            or linha.get("produto_original")
            or "Soja"
        )
        produto_base = normalizar_produto_base(produto_original)

        uf = limpar_texto(
            linha.get("estado")
            or linha.get("uf")
            or linha.get("UF")
            or "BA"
        ).upper()

        cidade = limpar_texto(
            linha.get("cidade")
            or linha.get("praca")
            or linha.get("praça")
            or "Oeste da Bahia - AIBA"
        )

        preco = parse_preco(
            linha.get("preco")
            or linha.get("preço")
            or linha.get("valor")
        )

        unidade = limpar_texto(linha.get("unidade") or "Saca 60 kg")
        data_iso = parse_data_qualquer(
            linha.get("data")
            or linha.get("data_iso")
            or linha.get("data_referencia")
        ) or agora_local().date().isoformat()

        fonte_url = limpar_texto(linha.get("fonte_url") or AIBA_URL)
        observacao = limpar_texto(
            linha.get("observacao")
            or linha.get("observação")
            or "Cotação regional complementar da AIBA via CSV local."
        )

        if not uf_monitorada(uf):
            continue
        if preco is None:
            continue
        if produto_base not in {"Soja", "Milho", "Algodão", "Arroz", "Feijão", "Sorgo"}:
            continue

        unidade_norm = remover_acentos(unidade).lower()
        converter = True

        if produto_base in {"Soja", "Milho", "Arroz", "Feijão", "Sorgo"} and "saca" in unidade_norm:
            converter = False
            unidade = "Saca 60 kg"

        if produto_base == "Algodão" and ("@" in unidade or "arroba" in unidade_norm):
            converter = False
            unidade = "Arroba (@)"

        itens.append(
            criar_item(
                produto_original=produto_original,
                produto_base=produto_base,
                uf=uf,
                estado=UFS_BRASIL.get(uf, uf),
                praca=cidade,
                unidade_original=unidade,
                preco_original=preco,
                data_referencia=data_iso,
                data_inicio=data_iso,
                data_fim=data_iso,
                periodo_referencia=data_para_br(data_iso),
                fonte="AIBA",
                fonte_url=fonte_url,
                tipo_fonte="regional",
                nivel="Regional",
                converter=converter,
                observacao=observacao,
            )
        )

    return itens


def coletar_aiba(status_fontes: list[dict[str, Any]]) -> list[dict[str, Any]]:
    itens = ler_csv_aiba_local()
    status_fontes.append(
        {
            "fonte": "AIBA",
            "url": AIBA_URL,
            "status": "ok_csv_local" if itens else "csv_local_sem_registros_validos",
            "total_registros": len(itens),
            "arquivo_local": str(AIBA_CSV_LOCAL),
            "observacao": (
                "AIBA configurada como fonte regional complementar por CSV local. "
                "Isso evita falha por bloqueio 403 do site da AIBA."
            ),
        }
    )
    return itens
# AUTO PATCH AIBA CSV LOCAL - FIM
'''

              ancora = "\n# =============================================================================\n# Execução principal\n# ============================================================================="
              if ancora not in texto:
                  raise SystemExit("ERRO: não foi encontrada a âncora da execução principal no coletor.")
              texto = texto.replace(ancora, "\n" + bloco + ancora, 1)

          path.write_text(texto, encoding="utf-8")
          print("Fallback CSV local da AIBA aplicado de forma estável no coletor.")
          PY

      - name: Validar sintaxe do coletor
        run: |
          echo "Coletor selecionado: $COLETOR"
          python -m py_compile "$COLETOR"

      - name: Rodar coletor de cotações
        env:
          TZ: America/Fortaleza
        run: |
          echo "Iniciando coletor de cotações Nordeste Agro..."
          python "$COLETOR"

      - name: Verificar arquivos gerados
        run: |
          echo "Verificando arquivos obrigatórios..."

          test -f cotacoes/public/cotacoes_nordeste.json
          test -f cotacoes/public/cotacoes_regionais.json
          test -f cotacoes/public/cotacoes_nordeste.csv
          test -f cotacoes/logs/status_ultima_execucao.json

          echo "Validando JSONs..."

          python -m json.tool cotacoes/public/cotacoes_nordeste.json > /tmp/cotacoes_nordeste_validado.json
          python -m json.tool cotacoes/public/cotacoes_regionais.json > /tmp/cotacoes_regionais_validado.json
          python -m json.tool cotacoes/logs/status_ultima_execucao.json > /tmp/status_ultima_execucao_validado.json

          python - <<'PY'
          import json
          from pathlib import Path

          caminho = Path("cotacoes/public/cotacoes_nordeste.json")
          dados = json.loads(caminho.read_text(encoding="utf-8"))
          lista = dados.get("dados", [])

          if not isinstance(lista, list) or len(lista) == 0:
              raise SystemExit("ERRO: cotacoes_nordeste.json foi gerado sem itens em dados.")

          print(f"JSON principal válido com {len(lista)} itens.")
          PY

      - name: Mostrar resumo da execução
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          caminho_status = Path("cotacoes/logs/status_ultima_execucao.json")

          if not caminho_status.exists():
              raise SystemExit("ERRO: status_ultima_execucao.json não encontrado.")

          status = json.loads(caminho_status.read_text(encoding="utf-8"))
          resumo = status.get("resumo", {})

          print("Resumo da execução")
          print("------------------")
          print("Versão:", status.get("versao"))
          print("Última sincronização:", status.get("ultima_sincronizacao"))
          print("Total tabela:", status.get("total_cotacoes_tabela"))
          print("Total HTML:", status.get("total_dados_html"))
          print("Sorgo CONAB tabela:", resumo.get("total_sorgo_conab_tabela"))
          print("Arroz:", resumo.get("total_arroz_extraido"))
          print("Feijão:", resumo.get("total_feijao_extraido"))
          print("Boi Gordo:", resumo.get("total_boi_gordo_extraido"))
          print("Leite:", resumo.get("total_leite_extraido"))

          dados_json = json.loads(
              Path("cotacoes/public/cotacoes_nordeste.json").read_text(encoding="utf-8")
          ).get("dados", [])

          print(
              "Milho/Soja/Algodão com histórico 360:",
              sum(
                  1 for x in dados_json
                  if x.get("produto_base") in ["Soja", "Milho", "Algodão"]
                  and len(x.get("historico_30d", [])) >= 2
              )
          )

          print(
              "Sorgo com histórico:",
              sum(
                  1 for x in dados_json
                  if x.get("produto_base") == "Sorgo"
                  and len(x.get("historico_30d", [])) >= 2
              )
          )

          print(
              "AIBA/regionais com histórico:",
              sum(
                  1 for x in dados_json
                  if (
                      "AIBA" in str(x.get("fonte", ""))
                      or x.get("nivel_comercializacao") == "Regional"
                  )
                  and len(x.get("historico_30d", [])) >= 2
              )
          )

          hist_aiba = Path("cotacoes/logs/historico_aiba.json")
          print("Histórico AIBA persistente:", "sim" if hist_aiba.exists() else "não")

          dup_aiba = Path("cotacoes/logs/debug_aiba_duplicados.json")
          if dup_aiba.exists():
              dups = json.loads(dup_aiba.read_text(encoding="utf-8"))
              print("Duplicados AIBA removidos:", dups.get("total_grupos_duplicados"))

          print("")
          print("Fontes:")
          for fonte in status.get("fontes", []):
              print(
                  "-",
                  fonte.get("fonte"),
                  "|",
                  fonte.get("status"),
                  "|",
                  fonte.get("total_registros")
              )
          PY

      - name: Commit automático dos arquivos atualizados
        shell: bash
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin main
          git pull --rebase --autostash origin main

          git add cotacoes/scripts/coletor_cotacoes_nordeste.py
          git add cotacoes/dados_aiba/aiba_soja_oeste_bahia.csv || true
          git add cotacoes/public/cotacoes_nordeste.json
          git add cotacoes/public/cotacoes_regionais.json
          git add cotacoes/public/cotacoes_nordeste.csv
          git add cotacoes/logs/status_ultima_execucao.json
          git add cotacoes/logs/debug_conab_produtos_360.json || true
          git add cotacoes/logs/debug_sorgo_conab.json || true
          git add cotacoes/logs/debug_prioridade_siagro.json || true
          git add cotacoes/logs/historico_aiba.json || true
          git add cotacoes/logs/debug_aiba_duplicados.json || true

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commitar."
            exit 0
          fi

          git commit -m "Atualizar cotações Nordeste Agro"
          git push origin HEAD:main

      - name: Finalizar execução
        run: |
          echo "Atualização das cotações Nordeste Agro concluída."
